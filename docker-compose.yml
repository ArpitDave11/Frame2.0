services:
  docmining:
    build: ./backend/docmining
    expose: ["8000"]
    env_file: ./backend/docmining/.env
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6

  spa:
    build: .
    expose: ["80"]
    depends_on:
      docmining:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./infra/local-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - spa
      - docmining
