events { worker_connections 64; }

http {
    # Upstream services (Docker Compose service names).
    upstream spa      { server spa:80; }
    upstream docmining { server docmining:8000; }

    server {
        listen 80;
        server_name _;

        # SPA — proxy to the spa container's nginx.
        location /frame/ {
            proxy_pass http://spa/frame/;
            proxy_set_header Host $host;
        }

        # DocMining API — rewrite /api/docmining/* → /api/v1/documents/*
        # Mirrors the vite dev proxy at vite.config.ts:51 and the future
        # Istio VirtualService rewrite.
        location /api/docmining/ {
            proxy_pass http://docmining/api/v1/documents/;
            proxy_set_header Host $host;
            proxy_read_timeout 200s;
            client_max_body_size 50m;
        }

        # DocMining healthz — direct passthrough.
        location = /api/docmining/healthz {
            proxy_pass http://docmining/healthz;
        }

        # Root redirect to /frame/
        location = / {
            return 302 /frame/;
        }
    }
}
