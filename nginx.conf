server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;

    # SPA fallback — serve index.html for any path under /frame/ that
    # doesn't match a static file.
    location /frame/ {
        try_files $uri $uri/ /frame/index.html;
    }

    # Module federation entry point — permissive CORS so the shell can
    # fetch it from any origin during development.
    location = /frame/assets/remoteEntry.js {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
