apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frame-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /frame(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.spa.serviceName }}
                port:
                  number: {{ .Values.spa.servicePort }}
          - path: /api/docmining(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.docmining.serviceName }}
                port:
                  number: {{ .Values.docmining.servicePort }}
