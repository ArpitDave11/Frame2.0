<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAME3 — Modernized Architecture Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bp-bg: #0a1628;
  --bp-bg-deep: #060e1a;
  --bp-grid: rgba(56, 139, 220, 0.06);
  --bp-grid-major: rgba(56, 139, 220, 0.12);
  --bp-line: #1e6cb8;
  --bp-line-bright: #3da5f5;
  --bp-line-dim: rgba(30, 108, 184, 0.4);
  --bp-text: #c8ddf0;
  --bp-text-bright: #e8f4ff;
  --bp-text-dim: rgba(200, 221, 240, 0.5);
  --bp-accent: #f59e0b;
  --bp-accent-dim: rgba(245, 158, 11, 0.3);
  --bp-danger: #ef4444;
  --bp-success: #10b981;
  --bp-purple: #a78bfa;
  --bp-cyan: #22d3ee;
  --bp-orange: #fb923c;
  --bp-pink: #f472b6;
  --node-radius: 12px;
  --transition-speed: 0.4s;
}

html { font-size: 14px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bp-bg);
  color: var(--bp-text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ─── BLUEPRINT GRID BACKGROUND ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--bp-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--bp-grid) 1px, transparent 1px),
    linear-gradient(var(--bp-grid-major) 1px, transparent 1px),
    linear-gradient(90deg, var(--bp-grid-major) 1px, transparent 1px);
  background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
  pointer-events: none;
  z-index: 0;
}

/* ─── GRAIN OVERLAY ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ─── TOP BAR ─── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bp-line-dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.topbar-logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bp-line-bright);
}

.topbar-logo span {
  color: var(--bp-accent);
}

.topbar-divider {
  width: 1px;
  height: 24px;
  background: var(--bp-line-dim);
}

.topbar-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--bp-text-dim);
  letter-spacing: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.legend-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--bp-text-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.legend-dot::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--dot-color);
  box-shadow: 0 0 6px var(--dot-color);
}

/* ─── BREADCRUMB ─── */
.breadcrumb {
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  height: 44px;
  background: rgba(10, 22, 40, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(30, 108, 184, 0.15);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 8px;
  z-index: 99;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
}

.breadcrumb-item {
  color: var(--bp-text-dim);
  cursor: pointer;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb-item:hover { color: var(--bp-line-bright); }
.breadcrumb-item.active { color: var(--bp-text-bright); cursor: default; }

.breadcrumb-sep {
  color: var(--bp-line-dim);
  font-size: 0.6rem;
}

/* ─── CANVAS AREA ─── */
.canvas {
  position: relative;
  z-index: 1;
  padding: 120px 40px 60px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.view-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bp-text-dim);
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease forwards;
}

.view-heading {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--bp-text-bright);
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease 0.1s forwards;
}

.view-desc {
  font-size: 0.85rem;
  color: var(--bp-text-dim);
  margin-bottom: 48px;
  max-width: 600px;
  text-align: center;
  line-height: 1.6;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease 0.2s forwards;
}

/* ─── SVG CONTAINER ─── */
.diagram-container {
  position: relative;
  width: 100%;
  max-width: 1200px;
  opacity: 0;
  animation: fadeSlideIn 0.6s ease 0.3s forwards;
}

.diagram-svg {
  width: 100%;
  height: auto;
  overflow: visible;
}

/* ─── NODE STYLES ─── */
.node-group { cursor: pointer; }
.node-group.no-drill { cursor: default; }

.node-box {
  fill: rgba(10, 22, 40, 0.85);
  stroke: var(--bp-line);
  stroke-width: 1.5;
  rx: 10;
  transition: all 0.3s ease;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

.node-group:not(.no-drill):hover .node-box {
  stroke: var(--bp-line-bright);
  stroke-width: 2;
  fill: rgba(20, 40, 65, 0.9);
  filter: drop-shadow(0 4px 20px rgba(61, 165, 245, 0.2));
}

.node-box.external {
  stroke: var(--bp-accent);
  stroke-dasharray: 6 3;
}

.node-group:not(.no-drill):hover .node-box.external {
  stroke: var(--bp-accent);
  filter: drop-shadow(0 4px 20px rgba(245, 158, 11, 0.2));
}

.node-box.database {
  stroke: var(--bp-success);
  rx: 16;
}

.node-group:not(.no-drill):hover .node-box.database {
  stroke: var(--bp-success);
  filter: drop-shadow(0 4px 20px rgba(16, 185, 129, 0.2));
}

.node-box.ai {
  stroke: var(--bp-purple);
}

.node-group:not(.no-drill):hover .node-box.ai {
  stroke: var(--bp-purple);
  filter: drop-shadow(0 4px 20px rgba(167, 139, 250, 0.2));
}

.node-box.user-actor {
  stroke: var(--bp-cyan);
}

.node-icon {
  font-size: 1.6rem;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

.node-label {
  fill: var(--bp-text-bright);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-anchor: middle;
  pointer-events: none;
}

.node-sublabel {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.5px;
}

.node-tech {
  fill: var(--bp-line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  text-anchor: middle;
  pointer-events: none;
}

.node-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  pointer-events: none;
}

.drill-hint {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  text-anchor: middle;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.node-group:not(.no-drill):hover .drill-hint { opacity: 1; }

/* ─── CONNECTION LINES ─── */
.conn-line {
  stroke: var(--bp-line-dim);
  stroke-width: 1.2;
  fill: none;
  marker-end: url(#arrowhead);
}

.conn-line.bidirectional {
  marker-start: url(#arrowhead-start);
}

.conn-line.data-flow {
  stroke: var(--bp-success);
  stroke-opacity: 0.4;
  stroke-dasharray: 4 4;
}

.conn-line.auth-flow {
  stroke: var(--bp-accent);
  stroke-opacity: 0.4;
  stroke-dasharray: 6 3;
}

.conn-line.ai-flow {
  stroke: var(--bp-purple);
  stroke-opacity: 0.4;
}

.conn-label {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  text-anchor: middle;
  letter-spacing: 0.3px;
}

/* ─── SECTION LABELS ─── */
.section-border {
  fill: none;
  stroke: var(--bp-line-dim);
  stroke-width: 1;
  stroke-dasharray: 8 4;
  rx: 12;
  opacity: 0.4;
}

.section-label {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
}

/* ─── BACK BUTTON ─── */
.back-btn {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line-dim);
  color: var(--bp-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 1px;
  padding: 10px 28px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: none;
  align-items: center;
  gap: 8px;
}

.back-btn:hover {
  border-color: var(--bp-line-bright);
  color: var(--bp-text-bright);
  box-shadow: 0 0 20px rgba(61, 165, 245, 0.15);
}

.back-btn.visible { display: flex; }

.back-btn svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* ─── TOOLTIP ─── */
.tooltip {
  position: fixed;
  z-index: 200;
  background: rgba(6, 14, 26, 0.96);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line);
  border-radius: 10px;
  padding: 14px 18px;
  max-width: 320px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.tooltip-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--bp-text-bright);
  margin-bottom: 4px;
}

.tooltip-desc {
  font-size: 0.75rem;
  color: var(--bp-text-dim);
  line-height: 1.5;
}

.tooltip-tech {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--bp-line-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--bp-line);
  letter-spacing: 0.5px;
}

.tooltip-port {
  display: inline-block;
  background: rgba(30, 108, 184, 0.15);
  border: 1px solid var(--bp-line-dim);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 4px;
  font-size: 0.6rem;
  color: var(--bp-line-bright);
}

/* ─── ANIMATIONS ─── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.conn-line { animation: fadeSlideIn 0.8s ease forwards; opacity: 0; }

/* stagger node entrance */
.node-group { opacity: 0; animation: fadeSlideIn 0.5s ease forwards; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .topbar { padding: 0 16px; }
  .topbar-right { display: none; }
  .canvas { padding: 110px 16px 80px; }
  .view-heading { font-size: 1.4rem; }
}
</style>
</head>

// ════════════════════════════════════════════
// RENDERING ENGINE
// ════════════════════════════════════════════

let currentLevel = 'system';
let history = [];
const canvas = document.getElementById('canvas');
const breadcrumb = document.getElementById('breadcrumb');
const backBtn = document.getElementById('back-btn');
const tooltip = document.getElementById('tooltip');
const tooltipTitle = document.getElementById('tooltip-title');
const tooltipDesc = document.getElementById('tooltip-desc');
const tooltipTech = document.getElementById('tooltip-tech');

function renderView(levelId, pushHistory = true) {
  const data = DATA[levelId];
  if (!data) return;

  if (pushHistory && currentLevel !== levelId) {
    history.push(currentLevel);
  }
  currentLevel = levelId;

  // Update breadcrumb
  updateBreadcrumb();

  // Show/hide back button
  backBtn.classList.toggle('visible', history.length > 0);

  // Calculate SVG bounds
  let maxX = 0, maxY = 0;
  data.nodes.forEach(n => {
    maxX = Math.max(maxX, n.x + n.w + 40);
    maxY = Math.max(maxY, n.y + n.h + 60);
  });
  const svgW = Math.max(maxX, 900);
  const svgH = maxY + 20;

  // Build SVG
  let svg = `<svg class="diagram-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // Defs
  svg += `<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(30,108,184,0.5)"/>
    </marker>
    <marker id="arrowhead-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse">
      <polygon points="8 0, 0 3, 8 6" fill="rgba(30,108,184,0.5)"/>
    </marker>
  </defs>`;

  // Connections (render first so they're behind nodes)
  data.connections.forEach((conn, i) => {
    const fromNode = data.nodes.find(n => n.id === conn.from);
    const toNode = data.nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode) return;

    const fx = fromNode.x + fromNode.w / 2;
    const fy = fromNode.y + fromNode.h / 2;
    const tx = toNode.x + toNode.w / 2;
    const ty = toNode.y + toNode.h / 2;

    // Calculate edge points (from border, not center)
    const { sx, sy, ex, ey } = getEdgePoints(fromNode, toNode);

    // Curved path
    const midX = (sx + ex) / 2;
    const midY = (sy + ey) / 2;
    const dx = ex - sx;
    const dy = ey - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const curve = Math.min(dist * 0.15, 30);
    const cx1 = midX - dy * 0.1;
    const cy1 = midY + dx * 0.1;

    const cls = conn.type ? `conn-line ${conn.type}` : 'conn-line';
    svg += `<path d="M${sx},${sy} Q${cx1},${cy1} ${ex},${ey}" class="${cls}" style="animation-delay: ${0.4 + i * 0.08}s"/>`;

    if (conn.label) {
      const lx = midX * 0.5 + cx1 * 0.5;
      const ly = midY * 0.5 + cy1 * 0.5 - 6;
      svg += `<text x="${lx}" y="${ly}" class="conn-label">${conn.label}</text>`;
    }
  });

  // Nodes
  data.nodes.forEach((node, i) => {
    const hasDrill = !!node.drillTo;
    const groupClass = hasDrill ? 'node-group' : 'node-group no-drill';
    const delay = 0.3 + i * 0.06;

    svg += `<g class="${groupClass}" data-id="${node.id}" data-drill="${node.drillTo || ''}" style="animation-delay: ${delay}s"`;
    if (node.tooltip) {
      svg += ` data-tooltip-title="${escHtml(node.tooltip.title)}" data-tooltip-desc="${escHtml(node.tooltip.desc)}" data-tooltip-tech="${escHtml(node.tooltip.tech)}"`;
      if (node.tooltip.port) svg += ` data-tooltip-port="${node.tooltip.port}"`;
    }
    svg += `>`;

    // Box
    const boxClass = node.type === 'external' ? 'node-box external' :
                     node.type === 'database' ? 'node-box database' :
                     node.type === 'ai' ? 'node-box ai' :
                     node.type === 'user-actor' ? 'node-box user-actor' : 'node-box';
    svg += `<rect x="${node.x}" y="${node.y}" width="${node.w}" height="${node.h}" class="${boxClass}"/>`;

    // Icon
    const iconY = node.tech ? node.y + node.h * 0.3 : node.y + node.h * 0.35;
    svg += `<text x="${node.x + node.w/2}" y="${iconY}" class="node-icon">${node.icon}</text>`;

    // Label
    const labelY = node.tech ? node.y + node.h * 0.58 : node.y + node.h * 0.62;
    svg += `<text x="${node.x + node.w/2}" y="${labelY}" class="node-label">${escHtml(node.label)}</text>`;

    // Sublabel
    if (node.sub) {
      const subY = node.tech ? node.y + node.h * 0.74 : node.y + node.h * 0.82;
      svg += `<text x="${node.x + node.w/2}" y="${subY}" class="node-sublabel">${escHtml(node.sub)}</text>`;
    }

    // Tech
    if (node.tech) {
      svg += `<text x="${node.x + node.w/2}" y="${node.y + node.h * 0.9}" class="node-tech">${escHtml(node.tech)}</text>`;
    }

    // Drill hint
    if (hasDrill) {
      svg += `<text x="${node.x + node.w/2}" y="${node.y + node.h + 16}" class="drill-hint">▼ CLICK TO DRILL DOWN</text>`;
    }

    svg += `</g>`;
  });

  svg += `</svg>`;

  // Render
  canvas.innerHTML = `
    <div class="view-title">${data.title}</div>
    <h1 class="view-heading">${data.heading}</h1>
    <p class="view-desc">${data.desc}</p>
    <div class="diagram-container">${svg}</div>
  `;

  // Bind events
  bindNodeEvents();
}

function getEdgePoints(from, to) {
  const fcx = from.x + from.w / 2, fcy = from.y + from.h / 2;
  const tcx = to.x + to.w / 2, tcy = to.y + to.h / 2;

  let sx, sy, ex, ey;

  // From node exit point
  const angle1 = Math.atan2(tcy - fcy, tcx - fcx);
  if (Math.abs(Math.cos(angle1)) * from.h > Math.abs(Math.sin(angle1)) * from.w) {
    sx = fcx + Math.sign(Math.cos(angle1)) * from.w / 2;
    sy = fcy + Math.tan(angle1) * Math.sign(Math.cos(angle1)) * from.w / 2;
  } else {
    sy = fcy + Math.sign(Math.sin(angle1)) * from.h / 2;
    sx = fcx + (1/Math.tan(angle1)) * Math.sign(Math.sin(angle1)) * from.h / 2;
  }

  // To node entry point
  const angle2 = Math.atan2(fcy - tcy, fcx - tcx);
  if (Math.abs(Math.cos(angle2)) * to.h > Math.abs(Math.sin(angle2)) * to.w) {
    ex = tcx + Math.sign(Math.cos(angle2)) * to.w / 2;
    ey = tcy + Math.tan(angle2) * Math.sign(Math.cos(angle2)) * to.w / 2;
  } else {
    ey = tcy + Math.sign(Math.sin(angle2)) * to.h / 2;
    ex = tcx + (1/Math.tan(angle2)) * Math.sign(Math.sin(angle2)) * to.h / 2;
  }

  return { sx, sy, ex, ey };
}

function bindNodeEvents() {
  document.querySelectorAll('.node-group').forEach(g => {
    // Click to drill
    g.addEventListener('click', () => {
      const drill = g.dataset.drill;
      if (drill && DATA[drill]) {
        renderView(drill);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Tooltip
    g.addEventListener('mouseenter', (e) => {
      const title = g.dataset.tooltipTitle;
      const desc = g.dataset.tooltipDesc;
      const tech = g.dataset.tooltipTech;
      const port = g.dataset.tooltipPort;
      if (!title) return;

      tooltipTitle.textContent = title;
      tooltipDesc.textContent = desc;
      tooltipTech.innerHTML = tech + (port ? `<span class="tooltip-port">:${port}</span>` : '');
      tooltip.classList.add('visible');
    });

    g.addEventListener('mousemove', (e) => {
      const pad = 16;
      let x = e.clientX + pad;
      let y = e.clientY + pad;
      const rect = tooltip.getBoundingClientRect();
      if (x + rect.width > window.innerWidth - pad) x = e.clientX - rect.width - pad;
      if (y + rect.height > window.innerHeight - pad) y = e.clientY - rect.height - pad;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });

    g.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });
}

function updateBreadcrumb() {
  const trail = [...history, currentLevel];
  let html = '';
  trail.forEach((levelId, i) => {
    const data = DATA[levelId];
    if (!data) return;
    const isLast = i === trail.length - 1;
    if (i > 0) html += `<span class="breadcrumb-sep">▸</span>`;
    if (isLast) {
      html += `<span class="breadcrumb-item active">${data.heading}</span>`;
    } else {
      html += `<span class="breadcrumb-item" onclick="navigateTo(${i})">${data.heading}</span>`;
    }
  });
  breadcrumb.innerHTML = html;
}

function navigateTo(index) {
  const trail = [...history, currentLevel];
  const targetLevel = trail[index];
  history = trail.slice(0, index);
  renderView(targetLevel, false);
  currentLevel = targetLevel;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderView(prev, false);
  currentLevel = prev;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    e.preventDefault();
    goBack();
  }
});

// ═══ INIT ═══
renderView('system');
</script>
