<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitLab-Agent — Interactive Architecture Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* RESET */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bp-bg: #0a1628;
  --bp-bg-deep: #060e1a;
  --bp-grid: rgba(56, 139, 220, 0.06);
  --bp-grid-major: rgba(56, 139, 220, 0.12);
  --bp-line: #1e6cb8;
  --bp-line-bright: #3da5f5;
  --bp-line-dim: rgba(30, 108, 184, 0.4);
  --bp-text: #c8ddf0;
  --bp-text-bright: #e8f4ff;
  --bp-text-dim: rgba(200, 221, 240, 0.5);
  --bp-accent: #f59e0b;
  --bp-accent-dim: rgba(245, 158, 11, 0.3);
  --bp-danger: #ef4444;
  --bp-success: #10b981;
  --bp-purple: #a78bfa;
  --bp-cyan: #22d3ee;
  --bp-orange: #fb923c;
  --bp-pink: #f472b6;
  --bp-teal: #2dd4bf;
  --node-radius: 12px;
  --transition-speed: 0.4s;
}

html { font-size: 14px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bp-bg);
  color: var(--bp-text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* GRID + GRAIN */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--bp-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--bp-grid) 1px, transparent 1px),
    linear-gradient(var(--bp-grid-major) 1px, transparent 1px),
    linear-gradient(90deg, var(--bp-grid-major) 1px, transparent 1px);
  background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bp-line-dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bp-line-bright);
}
.topbar-logo span { color: var(--bp-accent); }
.topbar-divider {
  width: 1px; height: 24px;
  background: var(--bp-line-dim);
}
.topbar-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--bp-text-dim);
  letter-spacing: 1px;
}
.topbar-right { display: flex; align-items: center; gap: 18px; }
.legend-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--bp-text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.legend-dot::before {
  content: '';
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dot-color);
}

/* BREADCRUMB */
.breadcrumb {
  position: fixed;
  top: 72px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(6, 14, 26, 0.85);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line-dim);
  border-radius: 24px;
  padding: 8px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.breadcrumb-item {
  color: var(--bp-text-dim);
  cursor: pointer;
  transition: color 0.2s;
}
.breadcrumb-item:hover { color: var(--bp-line-bright); }
.breadcrumb-item.active { color: var(--bp-text-bright); cursor: default; }
.breadcrumb-sep { color: var(--bp-line-dim); }

/* CANVAS */
.canvas {
  position: relative;
  z-index: 1;
  padding: 130px 24px 100px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.view-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bp-accent);
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease 0s forwards;
}
.view-heading {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--bp-text-bright);
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease 0.1s forwards;
  text-align: center;
}
.view-desc {
  font-size: 0.85rem;
  color: var(--bp-text-dim);
  margin-bottom: 48px;
  max-width: 760px;
  text-align: center;
  line-height: 1.6;
  opacity: 0;
  animation: fadeSlideIn 0.5s ease 0.2s forwards;
}

/* DIAGRAM */
.diagram-container {
  position: relative;
  width: 100%;
  max-width: 1320px;
  opacity: 0;
  animation: fadeSlideIn 0.6s ease 0.3s forwards;
}
.diagram-svg {
  width: 100%;
  height: auto;
  overflow: visible;
}

/* NODES */
.node-group { cursor: pointer; }
.node-group.no-drill { cursor: default; }

.node-box {
  fill: rgba(10, 22, 40, 0.85);
  stroke: var(--bp-line);
  stroke-width: 1.5;
  rx: 10;
  transition: all 0.3s ease;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.node-group:not(.no-drill):hover .node-box {
  stroke: var(--bp-line-bright);
  stroke-width: 2;
  fill: rgba(20, 40, 65, 0.95);
  filter: drop-shadow(0 4px 20px rgba(61, 165, 245, 0.25));
}

.node-box.external {
  stroke: var(--bp-accent);
  stroke-dasharray: 6 3;
}
.node-group:not(.no-drill):hover .node-box.external {
  stroke: var(--bp-accent);
  filter: drop-shadow(0 4px 20px rgba(245, 158, 11, 0.25));
}

.node-box.database {
  stroke: var(--bp-success);
  rx: 16;
}
.node-group:not(.no-drill):hover .node-box.database {
  filter: drop-shadow(0 4px 20px rgba(16, 185, 129, 0.25));
}

.node-box.ai { stroke: var(--bp-purple); }
.node-group:not(.no-drill):hover .node-box.ai {
  filter: drop-shadow(0 4px 20px rgba(167, 139, 250, 0.25));
}

.node-box.user-actor { stroke: var(--bp-cyan); }

.node-box.tool { stroke: var(--bp-teal); }
.node-group:not(.no-drill):hover .node-box.tool {
  filter: drop-shadow(0 4px 20px rgba(45, 212, 191, 0.25));
}

.node-box.cache { stroke: var(--bp-orange); rx: 6; }
.node-group:not(.no-drill):hover .node-box.cache {
  filter: drop-shadow(0 4px 20px rgba(251, 146, 60, 0.25));
}

.node-box.skill { stroke: var(--bp-pink); }
.node-group:not(.no-drill):hover .node-box.skill {
  filter: drop-shadow(0 4px 20px rgba(244, 114, 182, 0.25));
}

.node-icon {
  font-size: 1.6rem;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.node-label {
  fill: var(--bp-text-bright);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-anchor: middle;
  pointer-events: none;
}
.node-sublabel {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.4px;
}
.node-tech {
  fill: var(--bp-line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  text-anchor: middle;
  pointer-events: none;
}
.drill-hint {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  text-anchor: middle;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.node-group:not(.no-drill):hover .drill-hint { opacity: 1; }

/* CONNECTIONS */
.conn-line {
  stroke: var(--bp-line-dim);
  stroke-width: 1.2;
  fill: none;
  marker-end: url(#arrowhead);
}
.conn-line.bidirectional { marker-start: url(#arrowhead-start); }
.conn-line.data-flow {
  stroke: var(--bp-success);
  stroke-opacity: 0.5;
  stroke-dasharray: 4 4;
}
.conn-line.auth-flow {
  stroke: var(--bp-accent);
  stroke-opacity: 0.5;
  stroke-dasharray: 6 3;
}
.conn-line.ai-flow {
  stroke: var(--bp-purple);
  stroke-opacity: 0.5;
}
.conn-line.tool-flow {
  stroke: var(--bp-teal);
  stroke-opacity: 0.55;
}
.conn-line.cache-flow {
  stroke: var(--bp-orange);
  stroke-opacity: 0.5;
  stroke-dasharray: 3 3;
}
.conn-label {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  text-anchor: middle;
  letter-spacing: 0.3px;
}

/* SECTION BORDERS */
.section-border {
  fill: rgba(30, 108, 184, 0.03);
  stroke: var(--bp-line-dim);
  stroke-width: 1;
  stroke-dasharray: 8 4;
  rx: 14;
  opacity: 0.55;
}
.section-label {
  fill: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.7;
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line-dim);
  color: var(--bp-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 1px;
  padding: 10px 28px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: none;
  align-items: center;
  gap: 8px;
}
.back-btn:hover {
  border-color: var(--bp-line-bright);
  color: var(--bp-text-bright);
  box-shadow: 0 0 20px rgba(61, 165, 245, 0.15);
}
.back-btn.visible { display: flex; }
.back-btn svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* HOME BUTTON */
.home-btn {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 100;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line-dim);
  color: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 1px;
  padding: 10px 18px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: none;
}
.home-btn:hover {
  border-color: var(--bp-line-bright);
  color: var(--bp-text-bright);
}
.home-btn.visible { display: inline-flex; }

/* TOOLTIP */
.tooltip {
  position: fixed;
  z-index: 200;
  background: rgba(6, 14, 26, 0.96);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-line);
  border-radius: 10px;
  padding: 14px 18px;
  max-width: 360px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}
.tooltip-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--bp-text-bright);
  margin-bottom: 6px;
}
.tooltip-desc {
  font-size: 12.5px;
  color: var(--bp-text);
  line-height: 1.55;
  margin-bottom: 8px;
}
.tooltip-tech {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--bp-line-bright);
  letter-spacing: 0.4px;
  border-top: 1px solid var(--bp-line-dim);
  padding-top: 8px;
}
.tooltip-port {
  display: inline-block;
  margin-left: 6px;
  color: var(--bp-accent);
  font-weight: 600;
}

/* ANIMATIONS */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes dashFlow {
  to { stroke-dashoffset: -16; }
}
.conn-line.data-flow, .conn-line.auth-flow, .conn-line.cache-flow {
  animation: dashFlow 1.4s linear infinite;
}

.node-group {
  opacity: 0;
  animation: fadeSlideIn 0.5s ease forwards;
}
.conn-line {
  opacity: 0;
  animation: fadeSlideIn 0.6s ease forwards;
}

/* HINT BAR (intro) */
.hint-bar {
  position: fixed;
  bottom: 32px;
  left: 32px;
  z-index: 100;
  background: rgba(6, 14, 26, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--bp-accent-dim);
  color: var(--bp-text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 1px;
  padding: 10px 18px;
  border-radius: 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hint-bar::before {
  content: '';
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bp-accent);
  box-shadow: 0 0 8px var(--bp-accent);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">GITLAB<span>-AGENT</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-subtitle">v1.1.5 · Codex GPT-5.2 · MCP HTTP · GitLab CI Component</div>
  </div>
  <div class="topbar-right">
    <div class="legend-dot" style="--dot-color: var(--bp-line-bright)">Service</div>
    <div class="legend-dot" style="--dot-color: var(--bp-purple)">Agent / LLM</div>
    <div class="legend-dot" style="--dot-color: var(--bp-teal)">MCP tool</div>
    <div class="legend-dot" style="--dot-color: var(--bp-orange)">Cache / FS</div>
    <div class="legend-dot" style="--dot-color: var(--bp-pink)">Skill</div>
    <div class="legend-dot" style="--dot-color: var(--bp-accent)">External</div>
    <div class="legend-dot" style="--dot-color: var(--bp-cyan)">Actor</div>
  </div>
</header>

<nav class="breadcrumb" id="breadcrumb">
  <span class="breadcrumb-item active" data-level="system">Pipeline Context</span>
</nav>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltip-title"></div>
  <div class="tooltip-desc" id="tooltip-desc"></div>
  <div class="tooltip-tech" id="tooltip-tech"></div>
</div>

<button class="back-btn" id="back-btn" onclick="goBack()">
  <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back
</button>

<button class="home-btn" id="home-btn" onclick="goHome()">↑ Pipeline Context</button>

<div class="hint-bar" id="hint-bar">Hover any node for details · Click highlighted nodes to drill down</div>

<main class="canvas" id="canvas"></main>

<script>
// ============================================================
// DATA MODEL — every level of the architecture
// ============================================================

const DATA = {

  // ─────────────────────────────────────────────────────────
  // LEVEL 1 — Pipeline Context
  // ─────────────────────────────────────────────────────────
  system: {
    title: 'LEVEL 1 — SYSTEM CONTEXT',
    heading: 'Pipeline Context',
    desc: 'How gitlab-agent fits into the GitLab CI ecosystem at UBS. Triggered on every merge_request_event, runs as a Kubernetes job, and posts inline review comments + UI test reports back to the MR. Click the gitlab-agent container to descend into the architecture.',
    nodes: [
      // Actors row
      { id: 'developer', x: 60, y: 60, w: 200, h: 80, icon: '👤', label: 'Developer', sub: 'Opens / updates MR',
        type: 'user-actor',
        tooltip: { title: 'Developer', desc: 'Engineer on the project. Every push to a MR branch fires a merge_request_event pipeline. The developer receives inline AI review comments and a UI test results summary back on the MR.', tech: 'No setup needed — fully transparent' } },

      { id: 'gitlab-ci', x: 540, y: 60, w: 240, h: 80, icon: '🦊', label: 'GitLab CI Runner', sub: 'Kubernetes executor',
        type: 'user-actor',
        tooltip: { title: 'GitLab CI Runner', desc: 'devcloud-kubernetes runner. Pulls the gitlab-agent Docker image and runs the mr-review.yml or ai-ui-testing.yml job. Allow_failure: true and interruptible: true — never blocks the merge.', tech: 'tags: kubernetes, devcloud-kubernetes' } },

      { id: 'mr-author', x: 1060, y: 60, w: 200, h: 80, icon: '📬', label: 'MR Discussions', sub: 'Inline comments + notes',
        type: 'user-actor',
        tooltip: { title: 'MR Discussions UI', desc: 'Where the agent\'s output lands. Inline review comments anchored to specific diff lines, plus a markdown summary note with the UI test results table and Allure report link.', tech: 'GitLab Discussions API · markdown' } },

      // The system box (center, large, drillable)
      { id: 'gitlab-agent', x: 380, y: 240, w: 560, h: 150, icon: '⚙️', label: 'gitlab-agent',
        sub: 'Agentic MR reviewer + UI tester',

        type: 'default', drillTo: 'container',
        tooltip: { title: 'gitlab-agent — The System', desc: 'A GitLab CI Component published as a Docker image. Two CI templates (mr-review.yml, ai-ui-testing.yml) both invoke the same image. Inside: Codex agent driven by Azure GPT-5.2-codex, a local MCP HTTP server providing GitLab + cache tools, and two skills (mr-reviewer, playwright-cli) that orchestrate the work. Self-contained — only outbound calls are to Azure OpenAI and GitLab.', tech: 'image: gitlab-agent:1.1.4 · component: 1.1.5' } },

      // External services row
      { id: 'azure-openai', x: 60, y: 480, w: 240, h: 80, icon: '🧠', label: 'Azure OpenAI', sub: 'gpt-5.2-codex',

      { id: 'gitlab-api', x: 360, y: 480, w: 220, h: 80, icon: '🐙', label: 'GitLab REST API', sub: 'devcloud.ubs.net /api/v4',
        type: 'external', drillTo: 'gitlab-api',

      { id: 'ext-reqs', x: 640, y: 480, w: 240, h: 80, icon: '📚', label: 'External Reqs Repo', sub: 'Optional org-wide standards',

        tooltip: { title: 'External Requirements Repository', desc: 'Optional Git repo containing organization-wide architecture and requirements docs. When EXTERNAL_REQUIREMENTS_REPO_URL is set, the MCP server clones it into docs/external/ during init. The agent loads these as additional review context. Local AGENTS.md still takes precedence on conflicts.', tech: 'EXTERNAL_REQUIREMENTS_REPO_URL · docs/external/' } },

      { id: 'gitlab-pages', x: 940, y: 480, w: 220, h: 80, icon: '📊', label: 'GitLab Pages', sub: 'Allure HTML reports',

      { id: 'telemetry', x: 1200, y: 280, w: 110, h: 70, icon: '📡', label: 'Telemetry', sub: 'cicd-cli',
        type: 'external',
        tooltip: { title: 'Telemetry sink', desc: 'after_script hook calls `cicd-cli push-telemetry --component-name gitlab-agent:mr-review`. Failure is non-fatal — the script always proceeds.', tech: 'cicd-cli push-telemetry' } },
    ],
    connections: [
      { from: 'developer', to: 'gitlab-ci', label: 'git push', type: '' },
      { from: 'gitlab-ci', to: 'gitlab-agent', label: 'docker run', type: '' },

      { from: 'gitlab-agent', to: 'gitlab-pages', label: 'allure artifacts', type: 'data-flow' },
      { from: 'gitlab-agent', to: 'telemetry', label: 'after_script', type: '' },
      { from: 'gitlab-api', to: 'mr-author', label: 'discussions + notes', type: 'data-flow' },

<script>
// ============================================================
// RENDER ENGINE — adapted from FRAME3 blueprint pattern
// ============================================================

let currentLevel = 'system';
let history = [];

const canvas = document.getElementById('canvas');
const backBtn = document.getElementById('back-btn');
const homeBtn = document.getElementById('home-btn');
const breadcrumb = document.getElementById('breadcrumb');
const tooltip = document.getElementById('tooltip');
const tooltipTitle = document.getElementById('tooltip-title');
const tooltipDesc = document.getElementById('tooltip-desc');
const tooltipTech = document.getElementById('tooltip-tech');
const hintBar = document.getElementById('hint-bar');

const LEVEL_LABELS = {
  'system': 'Pipeline Context',
  'container': 'Container Diagram',
  'mcp': 'MCP Server',
  'agent': 'Codex Agent',
  'skills': 'Skills',
  'cache': 'Cache FS',
  'gitlab-api': 'GitLab API',
  'review-flow': 'Review Flow',
  'test-flow': 'UI Test Flow',
};

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderView(levelId, pushHistory = true) {
  const data = DATA[levelId];
  if (!data) return;

  if (pushHistory && currentLevel !== levelId) {
    history.push(currentLevel);
  }
  currentLevel = levelId;

  updateBreadcrumb();
  backBtn.classList.toggle('visible', history.length > 0);
  homeBtn.classList.toggle('visible', currentLevel !== 'system');
  hintBar.style.display = currentLevel === 'system' ? '' : 'none';

  // SVG bounds
  let maxX = 0, maxY = 0;
  data.nodes.forEach(n => {
    maxX = Math.max(maxX, n.x + n.w + 40);
    maxY = Math.max(maxY, n.y + n.h + 60);
  });
  const svgW = Math.max(maxX, 1100);
  const svgH = maxY + 20;

  let svg = `<svg class="diagram-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // Defs — arrow markers
  svg += `<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(30,108,184,0.55)"/>
    </marker>
    <marker id="arrowhead-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse">
      <polygon points="8 0, 0 3, 8 6" fill="rgba(30,108,184,0.55)"/>
    </marker>
  </defs>`;

  // Connections first (so they're behind nodes)
  data.connections.forEach((conn, i) => {
    const fromNode = data.nodes.find(n => n.id === conn.from);
    const toNode = data.nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode) return;

    const { sx, sy, ex, ey } = getEdgePoints(fromNode, toNode);
    const midX = (sx + ex) / 2;
    const midY = (sy + ey) / 2;
    const dx = ex - sx;
    const dy = ey - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const curve = Math.min(dist * 0.12, 32);
    const cx1 = midX - dy * 0.08;
    const cy1 = midY + dx * 0.08;

    const cls = conn.type ? `conn-line ${conn.type}` : 'conn-line';
    svg += `<path d="M${sx},${sy} Q${cx1},${cy1} ${ex},${ey}" class="${cls}" style="animation-delay: ${0.4 + i * 0.04}s"/>`;

    if (conn.label) {
      const lx = midX * 0.5 + cx1 * 0.5;
      const ly = midY * 0.5 + cy1 * 0.5 - 6;
      svg += `<text x="${lx}" y="${ly}" class="conn-label">${escHtml(conn.label)}</text>`;
    }
  });

  // Nodes
  data.nodes.forEach((node, i) => {
    const hasDrill = !!node.drillTo;
    const groupClass = hasDrill ? 'node-group' : 'node-group no-drill';
    const delay = 0.3 + i * 0.05;

    svg += `<g class="${groupClass}" data-id="${node.id}" data-drill="${node.drillTo || ''}" style="animation-delay: ${delay}s"`;
    if (node.tooltip) {
      svg += ` data-tooltip-title="${escHtml(node.tooltip.title)}" data-tooltip-desc="${escHtml(node.tooltip.desc)}" data-tooltip-tech="${escHtml(node.tooltip.tech || '')}"`;
      if (node.tooltip.port) svg += ` data-tooltip-port="${escHtml(node.tooltip.port)}"`;
    }
    svg += `>`;

    // Box class by type
    const boxClass = node.type === 'external' ? 'node-box external' :
                     node.type === 'database' ? 'node-box database' :
                     node.type === 'ai' ? 'node-box ai' :
                     node.type === 'user-actor' ? 'node-box user-actor' :
                     node.type === 'tool' ? 'node-box tool' :
                     node.type === 'cache' ? 'node-box cache' :
                     node.type === 'skill' ? 'node-box skill' : 'node-box';
    svg += `<rect x="${node.x}" y="${node.y}" width="${node.w}" height="${node.h}" class="${boxClass}"/>`;

    // Icon
    const iconY = node.tech ? node.y + node.h * 0.28 : node.y + node.h * 0.33;
    svg += `<text x="${node.x + node.w/2}" y="${iconY}" class="node-icon">${node.icon || ''}</text>`;

    // Label — supports newline (split via \n in source)
    const labelLines = (node.label || '').split('\n');
    const labelY = node.tech ? node.y + node.h * 0.56 : node.y + node.h * 0.6;
    labelLines.forEach((line, idx) => {
      svg += `<text x="${node.x + node.w/2}" y="${labelY + idx * 14}" class="node-label">${escHtml(line)}</text>`;
    });

    // Sublabel
    if (node.sub) {
      const subY = node.tech ? node.y + node.h * 0.76 : node.y + node.h * 0.82;
      svg += `<text x="${node.x + node.w/2}" y="${subY + (labelLines.length - 1) * 8}" class="node-sublabel">${escHtml(node.sub)}</text>`;
    }

    // Tech (smallest line)
    if (node.tech) {
      svg += `<text x="${node.x + node.w/2}" y="${node.y + node.h * 0.92}" class="node-tech">${escHtml(node.tech)}</text>`;
    }

    // Drill hint
    if (hasDrill) {
      svg += `<text x="${node.x + node.w/2}" y="${node.y + node.h + 14}" class="drill-hint">▼ CLICK TO DRILL DOWN</text>`;
    }

    svg += `</g>`;
  });

  svg += `</svg>`;

  // Render — plus quick-jump pills at the bottom of L2
  let extra = '';
  if (levelId === 'container') {
    extra = `
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:28px; justify-content:center; opacity:0; animation: fadeSlideIn 0.5s ease 0.7s forwards;">
        ${[
          ['Review run flow', 'review-flow'],
          ['UI test run flow', 'test-flow'],
          ['GitLab REST API', 'gitlab-api'],
        ].map(([label, id]) =>
          `<button onclick="navigateTo('${id}')" style="background:rgba(6,14,26,0.75); border:1px solid var(--bp-line-dim); color:var(--bp-text-dim); font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:1px; padding:8px 18px; border-radius:18px; cursor:pointer; text-transform:uppercase;" onmouseover="this.style.borderColor='var(--bp-line-bright)';this.style.color='var(--bp-text-bright)'" onmouseout="this.style.borderColor='var(--bp-line-dim)';this.style.color='var(--bp-text-dim)'">${label} →</button>`
        ).join('')}
      </div>`;
  }

  canvas.innerHTML = `
    <div class="view-title">${escHtml(data.title)}</div>
    <h1 class="view-heading">${escHtml(data.heading)}</h1>
    <p class="view-desc">${escHtml(data.desc)}</p>
    <div class="diagram-container">${svg}</div>
    ${extra}
  `;

  bindNodeEvents();
}

function getEdgePoints(from, to) {
  const fcx = from.x + from.w / 2, fcy = from.y + from.h / 2;
  const tcx = to.x + to.w / 2, tcy = to.y + to.h / 2;
  const dx = tcx - fcx, dy = tcy - fcy;
  const adx = Math.abs(dx), ady = Math.abs(dy);

  let sx, sy, ex, ey;
  // Decide on which edge each endpoint lives — pick the dominant axis
  if (adx > ady) {
    // horizontal-dominant: exit/enter via left or right edge
    sx = dx > 0 ? from.x + from.w : from.x;
    sy = fcy;
    ex = dx > 0 ? to.x : to.x + to.w;
    ey = tcy;
  } else {
    // vertical-dominant: exit/enter via top or bottom edge
    sx = fcx;
    sy = dy > 0 ? from.y + from.h : from.y;
    ex = tcx;
    ey = dy > 0 ? to.y : to.y + to.h;
  }
  return { sx, sy, ex, ey };
}

function bindNodeEvents() {
  document.querySelectorAll('.node-group').forEach(group => {
    const drillTo = group.dataset.drill;
    if (drillTo) {
      group.addEventListener('click', () => navigateTo(drillTo));
    }
    // Tooltip
    if (group.dataset.tooltipTitle) {
      group.addEventListener('mouseenter', e => showTooltip(group, e));
      group.addEventListener('mousemove', e => moveTooltip(e));
      group.addEventListener('mouseleave', hideTooltip);
    }
  });
}

function showTooltip(group, e) {
  tooltipTitle.textContent = group.dataset.tooltipTitle || '';
  tooltipDesc.textContent = group.dataset.tooltipDesc || '';
  const tech = group.dataset.tooltipTech || '';
  const port = group.dataset.tooltipPort;
  if (tech || port) {
    tooltipTech.innerHTML = escHtml(tech) + (port ? `<span class="tooltip-port">:${escHtml(port)}</span>` : '');
    tooltipTech.style.display = '';
  } else {
    tooltipTech.style.display = 'none';
  }
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 18;
  const y = e.clientY + 18;
  // Keep within viewport
  const rect = tooltip.getBoundingClientRect();
  const adjX = (x + rect.width > window.innerWidth - 16) ? window.innerWidth - rect.width - 16 : x;
  const adjY = (y + rect.height > window.innerHeight - 16) ? e.clientY - rect.height - 18 : y;
  tooltip.style.left = adjX + 'px';
  tooltip.style.top = adjY + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function navigateTo(levelId) {
  renderView(levelId, true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderView(prev, false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  history = [];
  renderView('system', false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateBreadcrumb() {
  // Build crumbs from history + current
  const crumbs = [...history, currentLevel];
  let html = '';
  crumbs.forEach((id, i) => {
    if (i > 0) html += `<span class="breadcrumb-sep">▸</span>`;
    const label = LEVEL_LABELS[id] || id;
    if (i === crumbs.length - 1) {
      html += `<span class="breadcrumb-item active">${escHtml(label)}</span>`;
    } else {
      html += `<span class="breadcrumb-item" data-jump="${i}">${escHtml(label)}</span>`;
    }
  });
  breadcrumb.innerHTML = html;
  // Wire up jump-back via breadcrumb
  breadcrumb.querySelectorAll('.breadcrumb-item[data-jump]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.jump);
      const target = history[idx];
      // Truncate history to that point
      history = history.slice(0, idx);
      renderView(target, false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

// Initial render
renderView('system', false);
</script>
